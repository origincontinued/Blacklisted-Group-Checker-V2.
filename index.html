<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registry Lookup</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 40px;
}

input {
    padding: 10px;
    width: 280px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 15px;
    margin-left: 5px;
    border-radius: 6px;
    border: none;
    background: #2d6cdf;
    color: white;
    cursor: pointer;
}

.card {
    margin-top: 20px;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 10px;
    display: inline-block;
    text-align: left;
    width: 420px;
}

.good { color: #4ade80; }
.bad { color: #fb7185; }
.warn { color: #facc15; }
</style>
</head>

<body>

<h1>Registry Lookup</h1>

<input id="search" placeholder="Username or Roblox ID">
<button onclick="searchUser()">Search</button>

<div id="results"></div>

<script>

const URL =
"https://docs.google.com/spreadsheets/d/1EaZfeDPhuE48ZX8-PdE01MWW-JUZkvsqBmdICfgcdls/gviz/tq?tqx=out:json&gid=1195980622";

// 🧠 PRIVATE INDEXED DATABASE
const userIndex = new Map();
let fullDatabase = [];

// ---------------- LOAD & BUILD INDEX ----------------
async function load() {
    const res = await fetch(URL);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    rows.forEach(r => {

        const record = {
            username: String(r.c[0]?.v || "").trim().toLowerCase(),
            id: String(r.c[1]?.v || "").trim(),
            reason: String(r.c[2]?.v || ""),
            issued: String(r.c[3]?.v || ""),
            expiry: String(r.c[4]?.v || ""),
            duration: String(r.c[5]?.v || ""),
            appealable: String(r.c[6]?.v || ""),
            appealed: String(r.c[7]?.v || "")
        };

        fullDatabase.push(record);

        // 🔥 INDEX BOTH USERNAME + ID
        if (record.username) userIndex.set(record.username, record);
        if (record.id) userIndex.set(record.id, record);
    });

    console.log("Indexed users:", userIndex.size);
}

// ---------------- EXPIRY CHECK ----------------
function isExpired(dateStr) {
    if (!dateStr) return false;

    const d = new Date(dateStr);
    if (isNaN(d)) return false;

    return d.getTime() < Date.now();
}

// ---------------- SEARCH (FAST LOOKUP) ----------------
function searchUser() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const out = document.getElementById("results");

    if (!q) return;

    const result = userIndex.get(q);

    if (!result) {
        out.innerHTML = "<p class='bad'>User NOT found in database</p>";
        return;
    }

    const expired = isExpired(result.expiry);
    const appealed = result.appealed.toLowerCase().includes("appeal");

    out.innerHTML = `
        <div class="card">
            <b>Username:</b> ${result.username}<br>
            <b>Roblox ID:</b> ${result.id}<br><br>

            <b>Reason:</b> ${result.reason}<br>
            <b>Issued:</b> ${result.issued}<br>

            <b>Expiry:</b>
            <span class="${expired ? 'bad' : 'good'}">
                ${result.expiry || "N/A"} ${expired ? "(EXPIRED)" : "(ACTIVE)"}
            </span><br>

            <b>Duration:</b> ${result.duration}<br>
            <b>Appealable:</b> ${result.appealable}<br>

            <b>Status:</b>
            <span class="${appealed ? 'warn' : 'good'}">
                ${appealed ? "APPEALED" : "CLEAR"}
            </span>
        </div>
    `;
}

// auto load
load();

</script>

</body>
</html>
